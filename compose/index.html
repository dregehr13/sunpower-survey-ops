<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Survey — Email Generator</title>
<style>
:root{
  --bg:#f2f2ef;--surface:#fff;--border:#e0e0db;--text:#1a1a1a;--muted:#6b6b6b;--faint:#aaa;
  --green:#2d6a0a;--green-bg:#e6f4d7;--amber:#92400e;--amber-bg:#fef3c7;
  --red:#991b1b;--red-bg:#fee2e2;--blue:#2563eb;--radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
.nav{background:#111;display:flex;align-items:center;padding:0 20px;height:48px;gap:12px;}
.brand{color:#fff;font-size:13px;font-weight:600;}
.brand span{color:#555;font-weight:400;}
.nav-mode{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid #333;color:#777;cursor:pointer;background:transparent;}
.nav-mode.active{background:#fff;color:#111;border-color:#fff;}
.nav-date{font-size:10px;color:#555;margin-left:auto;}
.wrap{max-width:1100px;margin:0 auto;padding:18px 22px;display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;}
.ptitle{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #f5f5f2;}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:11px;color:var(--muted);}
.stat-val{font-size:13px;font-weight:600;}
.stat-val.good{color:var(--green);}
.stat-val.warn{color:var(--amber);}
.stat-val.bad{color:var(--red);}
.obs-list{margin:8px 0 0;}
.obs-item{display:flex;align-items:flex-start;gap:7px;padding:5px 8px;border-radius:6px;background:#fef9ec;border:1px solid #fde68a;font-size:11px;color:#78350f;margin-bottom:5px;line-height:1.5;cursor:pointer;}
.obs-item input[type=checkbox]{flex-shrink:0;margin-top:2px;cursor:pointer;}
.obs-item.unchecked{opacity:.45;background:#f5f5f2;border-color:#e0e0db;color:var(--muted);}
textarea{width:100%;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);resize:vertical;font-family:inherit;outline:none;line-height:1.5;}
textarea:focus{border-color:#999;}
.btn{font-size:12px;padding:6px 13px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn-primary{background:#111;color:#fff;border-color:#111;}
.btn-primary:hover{background:#333;}
.btn-primary:disabled{opacity:.4;cursor:default;}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.options-list{margin:10px 0 0;}
.opt{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);line-height:1.6;cursor:pointer;margin-bottom:7px;transition:border-color .1s,background .1s;}
.opt:hover{border-color:#999;background:#fafaf8;}
.opt.selected{border-color:var(--blue);background:#eff6ff;}
.opt-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-bottom:4px;}
.loading{font-size:11px;color:var(--muted);padding:12px 0;text-align:center;}
.preview-frame{width:100%;border:none;border-radius:var(--radius-lg);background:#f4f4f4;}
.preview-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.preview-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);}
.preview-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.preview-actions{display:flex;gap:7px;}
.subject-row{margin-bottom:12px;}
.subject-row label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
.subject-row input{width:100%;font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none;}
.subject-row input:focus{border-color:#999;}
.empty-state{padding:48px;text-align:center;color:var(--faint);font-size:12px;line-height:1.8;}
.section-gap{margin-top:12px;}
@media(max-width:860px){.wrap{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav class="nav">
  <div class="brand">Site Survey <span>Email</span></div>
  <button class="nav-mode" id="btn-monday" onclick="setMode('monday')">Monday recap</button>
  <button class="nav-mode" id="btn-daily" onclick="setMode('daily')">Daily (Tue–Fri)</button>
  <span class="nav-date" id="nav-date"></span>
</nav>

<div class="wrap">
  <div>
    <div class="panel" id="stats-panel">
      <div class="ptitle" id="stats-period">Stats</div>
      <div id="stats-body"><div class="empty-state">No data loaded.<br>Export the dashboard first to bake in the latest data.</div></div>
    </div>

    <div class="panel section-gap" id="obs-panel">
      <div class="ptitle">Flagged observations <span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--faint);">— check to include in AI commentary</span></div>
      <div id="obs-body"></div>
    </div>

    <div class="panel section-gap">
      <div class="ptitle">Commentary</div>
      <div id="commentary-body">
        <div class="btn-row">
          <button class="btn btn-primary" id="gen-btn" onclick="generateCommentary()" disabled>Generate options</button>
        </div>
      </div>
      <div class="section-gap">
        <label style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;">Operational context <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional — informs generation)</span></label>
        <textarea id="manual-note" rows="3" placeholder="e.g. One team was short-staffed Tuesday. Scheduling system was down Thursday morning."></textarea>
      </div>
    </div>
  </div>

  <div>
    <div class="preview-wrap">
      <div class="preview-bar">
        <span class="preview-label">Email preview</span>
        <div class="preview-actions">
          <button class="btn" onclick="copyHTML()">Copy HTML</button>
          <button class="btn btn-primary" onclick="openOutlook()">Open in Outlook</button>
        </div>
      </div>
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);">
        <div class="subject-row">
          <label>To</label>
          <input type="text" id="to-field" value="allie.morais@sunpower.com; spencer.jensen@sunpower.com; Kody.Wilde@sunpower.com" readonly>
        </div>
        <div class="subject-row" style="margin-bottom:0;">
          <label>Subject</label>
          <input type="text" id="subject-field" value="">
        </div>
      </div>
      <div style="padding:16px;background:#eee;">
        <iframe id="preview-frame" class="preview-frame" style="min-height:500px;"></iframe>
      </div>
    </div>
  </div>
</div>

<script src="/data.js"></script>
<script>
// ─── CONFIG ───────────────────────────────────────────────
const PASSWORD      = 'sunpower';
const DASHBOARD_URL = 'https://sunpower-survey-ops.vercel.app';

// ─── PROJECTION DIMENSIONS ────────────────────────────────
// Fields used to segment cycle time estimates for WIP projection.
// Order matters for fallback: most specific first. When a combo has
// no recent completions, it drops the last dim and retries.
// To add surveyor type once the SF field is live:
//   const PROJECTION_DIMS = ['region', 'surveyor_type'];
const PROJECTION_DIMS = ['region'];

// Build a map of segment key → avg cycle time from a set of completions.
function buildSegmentAvgs(completions, dims){
  const m={};
  completions.forEach(r=>{
    const key=dims.map(d=>r[d]||'').join('|');
    if(!m[key]) m[key]=[];
    m[key].push(r.ct_total);
  });
  const out={};
  Object.entries(m).forEach(([k,vals])=>{ const a=avg(vals); if(a!=null) out[k]=a; });
  return out;
}

// Look up estimated cycle time for a single WIP row.
// Falls back from full key → prefix subsets → global avg.
function lookupSegmentAvg(r, dims, segAvgs, globalAvg){
  for(let len=dims.length; len>=1; len--){
    const key=dims.slice(0,len).map(d=>r[d]||'').join('|');
    if(segAvgs[key]!=null) return segAvgs[key];
  }
  return globalAvg;
}

// ─── STATE ────────────────────────────────────────────────
let mode = 'monday';
let selectedCommentary = '';
let stats = null;

// ─── AUTH ─────────────────────────────────────────────────
(function auth(){
  if(sessionStorage.getItem('ops_auth')==='1') return;
  const pw = prompt('Password:');
  if(pw === PASSWORD){ sessionStorage.setItem('ops_auth','1'); return; }
  document.body.innerHTML='<p style="padding:2rem;font-family:sans-serif;color:#666;">Access denied.</p>';
  throw new Error('auth');
})();

// ─── DATE UTILS ───────────────────────────────────────────
function toISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtShort(s){ if(!s) return '—'; return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtMed(s){ if(!s) return '—'; return new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function todayISO(){ return toISO(new Date()); }
function getLastWeekRange(){
  const today=new Date(); const dow=today.getDay();
  const sinceMon=dow===0?6:dow-1;
  const lastMon=addDays(today,-(sinceMon+7));
  return {from:toISO(lastMon),to:toISO(addDays(lastMon,6))};
}
function getThisWeekMon(){
  const today=new Date(); const dow=today.getDay();
  return toISO(addDays(today,-(dow===0?6:dow-1)));
}
function getYesterday(){ return toISO(addDays(new Date(),-1)); }

// Only In Progress projects count in all metrics
const ROWS = RAW.filter(r => !r.project_status || r.project_status === 'In Progress');

// ─── STATS HELPERS ────────────────────────────────────────
function avg(arr){ return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null; }
function med(arr){
  if(!arr.length) return null;
  const s=[...arr].sort((a,b)=>a-b), m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}
function iqrFence(arr,mult=1.5){
  if(arr.length<4) return Infinity;
  const s=[...arr].sort((a,b)=>a-b);
  const q1=s[Math.floor(s.length*.25)],q3=s[Math.floor(s.length*.75)];
  return q3+mult*(q3-q1);
}
function weekMedCycle(from,to){
  const cts=ROWS.filter(r=>r.complete>=from&&r.complete<=to).map(r=>r.ct_total).filter(x=>x!=null&&x>=0);
  return med(cts);
}
function weekOnTargetPct(from,to){
  const cts=ROWS.filter(r=>r.complete>=from&&r.complete<=to).map(r=>r.ct_total).filter(x=>x!=null&&x>=0);
  return cts.length?Math.round(cts.filter(x=>x<=4).length/cts.length*100):null;
}

// ─── COMPUTE STATS ────────────────────────────────────────
function computeStats(){
  if(!ROWS.length) return null;

  if(mode==='monday'){
    const period=getLastWeekRange();
    const rows=ROWS.filter(r=>r.complete>=period.from&&r.complete<=period.to&&!(r.start&&r.complete<r.start));
    const cts=rows.map(r=>r.ct_total).filter(x=>x!=null&&x>=0);
    const allCtsM=ROWS.filter(r=>r.complete&&r.ct_total!=null&&r.ct_total>=0).map(r=>r.ct_total);
    const fence=iqrFence(allCtsM);
    const outlierRows=rows.filter(r=>r.ct_total!=null&&r.ct_total>fence);

    const wip=ROWS.filter(r=>r.start&&r.start<=period.to&&(!r.complete||r.complete>period.to)).length;
    const wipPrior=ROWS.filter(r=>r.start&&r.start<period.from&&(!r.complete||r.complete>=period.from)).length;
    const wipChange=wip-wipPrior;

    // Fetch 7 weeks of medians (last 5 displayed, first 2 provide rolling context)
    const allTrend=[];
    for(let i=6;i>=0;i--){
      const wS=toISO(addDays(new Date(period.from+'T12:00:00'),-7*i));
      const wE=toISO(addDays(new Date(wS+'T12:00:00'),6));
      const cohortComplete=ROWS.filter(r=>r.start>=wS&&r.start<=wE&&r.list==='Complete').length;
      const cohortActive=ROWS.filter(r=>r.start>=wS&&r.start<=wE&&r.list&&r.list!=='Complete'&&r.list!=='Not Required').length;
      const weekCompl=ROWS.filter(r=>r.complete>=wS&&r.complete<=wE&&!(r.start&&r.complete<r.start)).length;
      const wipEow=ROWS.filter(r=>r.start&&r.start<=wE&&(!r.complete||r.complete>wE)).length;
      allTrend.push({label:fmtShort(wS),med:weekMedCycle(wS,wE),onTgt:weekOnTargetPct(wS,wE),count:weekCompl,cohortComplete,cohortActive,wipEow});
    }
    for(let i=0;i<allTrend.length;i++){
      const ms=[allTrend[i-2]?.med,allTrend[i-1]?.med,allTrend[i].med].filter(x=>x!=null&&x>=0);
      allTrend[i].roll3=ms.length===3?ms.reduce((a,b)=>a+b,0)/3:null;
      // Spencer formula: EOW WIP ÷ avg completions (this week + 2 prior)
      if(i>=2){
        const avgC=(allTrend[i].count+allTrend[i-1].count+allTrend[i-2].count)/3;
        allTrend[i].pipeRatio=avgC>0?Math.round(allTrend[i].wipEow/avgC*100)/100:null;
      }
    }
    const weeklyTrend=allTrend.slice(-5);
    const medW1=allTrend[4].med,medW2=allTrend[5].med,medW3=med(cts);
    const rolling=[medW1,medW2,medW3].filter(x=>x!=null);
    const rollingMed=rolling.length?rolling.reduce((a,b)=>a+b,0)/rolling.length:null;
    const prevMed=avg([medW1,medW2].filter(x=>x!=null));
    let trend=null;
    if(medW3!=null&&prevMed!=null){
      trend=medW3<prevMed-0.3?'Improving':medW3>prevMed+0.3?'Slipping':'Holding';
    }

    const onTargetPct=cts.length?Math.round(cts.filter(x=>x<=4).length/cts.length*100):null;
    const newIn=ROWS.filter(r=>r.start>=period.from&&r.start<=period.to).length;

    // Pipeline Ratio = EOW WIP ÷ avg completions (reporting week + 2 prior) — Spencer's model
    const prWeeks=[];
    for(let i=0;i<=2;i++){
      const wS=toISO(addDays(new Date(period.from+'T12:00:00'),-7*i));
      const wE=toISO(addDays(new Date(wS+'T12:00:00'),6));
      prWeeks.push(ROWS.filter(r=>r.complete>=wS&&r.complete<=wE&&!(r.start&&r.complete<r.start)).length);
    }
    const prAvg=prWeeks.reduce((a,b)=>a+b,0)/3;
    const pipelineRatio=prAvg>0?wip/prAvg:null;

    return {
      mode:'monday', period, periodLabel:`${fmtShort(period.from)} – ${fmtShort(period.to)}`,
      newIn, wip, wipChange, pipelineRatio, prAvg,
      completedCount:rows.length,
      medCycle:med(cts), avgCycle:avg(cts), onTargetPct,
      outlierCount:outlierRows.length,
      outlierRows,
      maxOutlier:outlierRows.length?Math.max(...outlierRows.map(r=>r.ct_total)):null,
      trend, rollingMed, weeklyTrend,
    };
  } else {
    const yesterday=getYesterday();
    const wtdFrom=getThisWeekMon();
    const completedYesterday=ROWS.filter(r=>r.complete===yesterday).length;
    const newInYesterday=ROWS.filter(r=>r.start===yesterday).length;
    const wtdRows=ROWS.filter(r=>r.complete>=wtdFrom&&r.complete<=yesterday);
    const wtdCts=wtdRows.map(r=>r.ct_total).filter(x=>x!=null&&x>=0);
    const newInWTD=ROWS.filter(r=>r.start>=wtdFrom&&r.start<=yesterday).length;

    // Pipeline-based projection (Little's Law: throughput = WIP / avg cycle)
    const yesterdayDow=new Date(yesterday+'T12:00:00').getDay();
    const daysElapsed=yesterdayDow===0?5:yesterdayDow; // Mon=1…Fri=5, Sun=5
    const daysRemaining=Math.max(5-daysElapsed,0);
    const wip=ROWS.filter(r=>r.start&&!r.complete).length;
    const sixWksAgo=toISO(addDays(new Date(yesterday+'T12:00:00'),-42));
    const recentCompletions=ROWS.filter(r=>r.complete>=sixWksAgo&&r.complete<=yesterday&&r.ct_total!=null&&r.ct_total>=1);
    const globalAvgCt=avg(recentCompletions.map(r=>r.ct_total))||4;
    const segAvgs=buildSegmentAvgs(recentCompletions,PROJECTION_DIMS);
    const wipProjects=ROWS.filter(r=>r.start&&!r.complete);
    const wipEstimates=wipProjects.map(r=>lookupSegmentAvg(r,PROJECTION_DIMS,segAvgs,globalAvgCt));
    const recentAvgCt=avg(wipEstimates)||globalAvgCt;
    const dailyThroughput=recentAvgCt>0?wip/recentAvgCt:0;
    const projectedWeek=daysRemaining>0
      ?wtdRows.length+Math.round(dailyThroughput*daysRemaining)
      :wtdRows.length;

    // 4-week historical weekly completion avg
    const wtdMonday=new Date(wtdFrom+'T12:00:00');
    const fourWkComps=[1,2,3,4].map(i=>{
      const wk=toISO(addDays(wtdMonday,-7*i));
      const wkEnd=toISO(addDays(new Date(wk+'T12:00:00'),6));
      return ROWS.filter(r=>r.complete>=wk&&r.complete<=wkEnd).length;
    });
    const histAvg=Math.round(fourWkComps.reduce((a,b)=>a+b,0)/4);

    // Day-by-day completions Mon → yesterday
    const DAY_LABELS=['Mon','Tue','Wed','Thu','Fri'];
    const wtdDays=[];
    for(let i=0;i<5;i++){
      const d=toISO(addDays(wtdMonday,i));
      if(d>yesterday) break;
      wtdDays.push({label:DAY_LABELS[i],date:d,count:ROWS.filter(r=>r.complete===d).length});
    }
    const histDailyAvg=histAvg/5;

    // Slow account detection
    const allCts=ROWS.filter(r=>r.complete&&r.ct_total!=null&&r.ct_total>=0).map(r=>r.ct_total);
    const globalFence=iqrFence(allCts);
    const slowYesterday=ROWS.filter(r=>r.complete===yesterday&&r.ct_total!=null&&r.ct_total>globalFence);

    return {
      mode:'daily', yesterday, wtdFrom, wtdTo:yesterday,
      completedYesterday, newInYesterday,
      completedWTD:wtdRows.length, newInWTD,
      medCycleWTD:med(wtdCts), avgCycleWTD:avg(wtdCts),
      projectedWeek, daysRemaining, wip, recentAvgCt, histAvg, histDailyAvg, wtdDays,
      slowYesterday,
    };
  }
}

// ─── OBSERVATIONS ─────────────────────────────────────────
function getObservations(s){
  const obs=[];
  if(!s) return obs;
  if(s.mode==='monday'){
    if(s.completedCount===0) obs.push('Zero completions this week — confirm data loaded correctly.');
    if(s.medCycle!=null&&s.medCycle>6) obs.push(`Median cycle time (${s.medCycle.toFixed(1)}d) is significantly above the 3d target.`);
    else if(s.medCycle!=null&&s.medCycle>4) obs.push(`Median cycle time (${s.medCycle.toFixed(1)}d) is above target.`);
    if(s.outlierCount>0) obs.push(`${s.outlierCount} outlier${s.outlierCount>1?'s':''} above IQR fence. Longest: ${s.maxOutlier.toFixed(0)}d.`);
    if(s.trend==='Slipping') obs.push('3-week trend is slipping — median cycle time is moving up.');
    if(s.trend==='Improving') obs.push('3-week trend is improving — median cycle time is moving down.');
    // Overdue WIP — include notes for AI context
    const today=new Date(); today.setHours(12,0,0,0);
    const todayISO=today.toISOString().slice(0,10);
    const overdueWip=ROWS.filter(r=>r.start&&!r.complete).map(r=>{
      const [ay,am,ad]=r.start.split('-').map(Number);
      const days=Math.round((today-new Date(ay,am-1,ad))/86400000);
      return {...r,days};
    }).filter(r=>r.days>4).sort((a,b)=>b.days-a.days);
    if(overdueWip.length>0){
      const critical=overdueWip.filter(r=>r.days>7);
      const withNotes=overdueWip.filter(r=>r.last_comment);
      if(critical.length>0){
        const truncNote=n=>n.length>80?n.slice(0,77)+'…':n;
        const detail=critical.slice(0,3).map(r=>r.last_comment?`${r.project} (${r.days}d): "${truncNote(r.last_comment)}"`:r.project+` (${r.days}d)`).join('; ');
        obs.push(`${critical.length} survey${critical.length!==1?'s':''} critical (>7d open). ${detail}`);
      } else if(overdueWip.length>0){
        const lon=overdueWip[0];
        const lonNote=lon.last_comment?(lon.last_comment.length>80?lon.last_comment.slice(0,77)+'…':lon.last_comment):'';
        obs.push(`${overdueWip.length} survey${overdueWip.length!==1?'s':''} overdue (>${4}d open). Longest: ${lon.days}d.${lonNote?' Note: "'+lonNote+'"':''}`);
      }
    }
  } else {
    if(s.completedYesterday===0) obs.push('Zero completions yesterday — confirm this is correct.');
    if(s.medCycleWTD!=null&&s.medCycleWTD>6) obs.push(`WTD median cycle (${s.medCycleWTD.toFixed(1)}d) is significantly above the 3d target.`);
    else if(s.medCycleWTD!=null&&s.medCycleWTD>4) obs.push(`WTD median cycle (${s.medCycleWTD.toFixed(1)}d) is above target.`);
    if(s.slowYesterday&&s.slowYesterday.length>0){
      s.slowYesterday.forEach(r=>{
        obs.push(`Outlier completed yesterday: ${r.ct_total.toFixed(0)}d${r.region?' ('+r.region+')':''} — may warrant a note.`);
      });
    }
  }
  return obs;
}

// ─── CARDS → PNG (canvas render, pixel-perfect in Outlook) ──
// cards: [{bg,b,lc,vc,sc,sbc,label,val,sub}, ...]
async function buildCardsImage(cards){
  const W=552,N=4,CW=Math.floor(W/N),CH=96,dpr=2;
  const canvas=document.createElement('canvas');
  canvas.width=W*dpr; canvas.height=CH*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // Layout constants (match HTML card padding)
  const PAD_X=12,PAD_TOP=14;
  const lY=PAD_TOP+11;        // label baseline
  const vY=lY+7+26;           // value baseline (label + gap + font)
  const sepY=vY+6;            // separator y
  const sY=sepY+1+5+11;       // sub baseline

  cards.forEach((c,i)=>{
    const x=i*CW, cx=x+CW/2;
    ctx.fillStyle=c.bg; ctx.fillRect(x,0,CW,CH);
    ctx.save(); ctx.beginPath(); ctx.rect(x,0,CW,CH); ctx.clip();

    // Label
    ctx.fillStyle=c.lc;
    ctx.font='11px Arial,Helvetica,sans-serif';
    ctx.textAlign='center';
    try{ctx.letterSpacing='0.5px';}catch(e){}
    ctx.fillText(c.label,cx,lY);
    try{ctx.letterSpacing='0px';}catch(e){}

    // Value
    ctx.fillStyle=c.vc;
    ctx.font='bold 26px Arial,Helvetica,sans-serif';
    ctx.fillText(c.val,cx,vY);

    // Sub
    ctx.fillStyle=c.sc;
    ctx.font='11px Arial,Helvetica,sans-serif';
    ctx.fillText(c.sub,cx,sY);

    ctx.restore();

    // Separator line
    ctx.strokeStyle=c.sbc; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(x+PAD_X,sepY+0.5); ctx.lineTo(x+CW-PAD_X,sepY+0.5);
    ctx.stroke();
  });

  // Outer border + internal dividers
  ctx.strokeStyle='#ddd'; ctx.lineWidth=1;
  ctx.strokeRect(0.5,0.5,W-1,CH-1);
  for(let i=1;i<N;i++){
    ctx.beginPath(); ctx.moveTo(i*CW+0.5,0.5); ctx.lineTo(i*CW+0.5,CH-0.5); ctx.stroke();
  }

  return canvas.toDataURL('image/png');
}

// ─── SVG → PNG (canvas render for Outlook image embedding) ───
async function svgToDataURL(svgStr,w,h){
  return new Promise(resolve=>{
    const dpr=2;
    const canvas=document.createElement('canvas');
    canvas.width=w*dpr; canvas.height=h*dpr;
    const ctx=canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    const img=new Image();
    img.onload=()=>{ ctx.drawImage(img,0,0); resolve(canvas.toDataURL('image/png')); };
    img.onerror=()=>resolve(null);
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
  });
}

  rows+=`<tr><td style="border-left:4px solid #378ADD;padding:16px 24px 16px 20px;">

  // ── Metric cards → canvas PNG ────────────────────────────
  let cardsData;
  if(s.mode==='monday'){

    const pr=prColors(s.pipelineRatio);
    const prSub=s.prAvg!=null?s.wip+' open · '+s.prAvg.toFixed(1)+' avg/wk':'';
    cardsData=[
      {bg:'#f8f8f8',b:'#e8e8e8',lc:'#999',vc:'#111',sc:'#aaa',sbc:'#e8e8e8',label:'NEW IN',val:String(s.newIn),sub:'week started'},
      {bg:'#f8f8f8',b:'#e8e8e8',lc:'#999',vc:'#111',sc:'#aaa',sbc:'#e8e8e8',label:'COMPLETED',val:String(s.completedCount),sub:'this week'},
      {bg:ct.bg,b:ct.b,lc:ct.lc,vc:ct.vc,sc:ct.sc,sbc:ct.sbc,label:'AVG CYCLE',val:s.avgCycle!=null?s.avgCycle.toFixed(1)+'d':'—',sub:'target: 4d'+ct.mark+(s.onTargetPct!=null?' · '+s.onTargetPct+'% ≤4d':'')},
      {bg:pr.bg,b:pr.b,lc:pr.lc,vc:pr.vc,sc:pr.sc,sbc:pr.sbc,label:'SS RATIO',val:s.pipelineRatio!=null?s.pipelineRatio.toFixed(1)+'×':'—',sub:prSub},
    ];
  } else {
    const ctA=ctColors(s.avgCycleWTD,4);
    const ctM=ctColors(s.medCycleWTD,3);
    cardsData=[
      {bg:'#f8f8f8',b:'#e8e8e8',lc:'#999',vc:'#111',sc:'#aaa',sbc:'#e8e8e8',label:'NEW IN WTD',val:String(s.newInWTD),sub:s.newInYesterday+' yesterday'},
      {bg:'#f8f8f8',b:'#e8e8e8',lc:'#999',vc:'#111',sc:'#aaa',sbc:'#e8e8e8',label:'COMPLETED WTD',val:String(s.completedWTD),sub:s.completedYesterday+' yesterday'},
      {bg:ctA.bg,b:ctA.b,lc:ctA.lc,vc:ctA.vc,sc:ctA.sc,sbc:ctA.sbc,label:'WTD AVG CYCLE',val:s.avgCycleWTD!=null?s.avgCycleWTD.toFixed(1)+'d':'—',sub:'target ≤4d'+ctA.mark},
      {bg:'#f8f8f8',b:'#e8e8e8',lc:'#999',vc:'#111',sc:'#aaa',sbc:'#e8e8e8',label:'PROJ WEEK',val:s.projectedWeek!=null?(s.daysRemaining>0?'~'+s.projectedWeek:String(s.projectedWeek)):'—',sub:s.daysRemaining>0?(s.wip+' open · '+s.recentAvgCt.toFixed(1)+'d avg cycle'):(s.histAvg+' 4-wk avg')},
    ];
  }
  const cardsPng=await buildCardsImage(cardsData);
  if(cardsPng) rows+=`<tr><td style="padding:20px 24px 0;"><img src="${cardsPng}" width="552" style="display:block;max-width:100%;border:0;" alt=""></td></tr>`;

  // ── Weekly trend SVG chart (Monday only) ────────────────
  if(s.mode==='monday'&&s.weeklyTrend&&s.weeklyTrend.length){
    const SVG_W=552,SVG_H=175;
    const ml=32,mr=36,mt=26,mb=42;
    const cw=SVG_W-ml-mr,ch=SVG_H-mt-mb;
    const n=s.weeklyTrend.length;
    const colW=cw/n;
    const barW=Math.floor(colW*0.55);
    const cx=i=>(ml+(i+0.5)*colW).toFixed(1);

    // Left axis: cohort count
    const maxCount=Math.max(...s.weeklyTrend.map(w=>(w.cohortComplete||0)+(w.cohortActive||0)),10);
    const yMaxC=Math.ceil(maxCount/10)*10;
    const cyC=v=>(mt+ch-(v/yMaxC)*ch).toFixed(1);

    // Right axis: pipeline ratio
    const maxRatio=Math.max(...s.weeklyTrend.map(w=>w.pipeRatio||0).filter(x=>x!=null),1);
    const yMaxD=Math.max(Math.ceil(maxRatio*2)/2,2);
    const cyD=v=>(mt+ch-(v/yMaxD)*ch).toFixed(1);

    let svgBody='';

    // Grid lines + left axis labels (count)
    [0,Math.round(yMaxC/2),yMaxC].forEach(v=>{
      const y=cyC(v);
      svgBody+=`<line x1="${ml}" y1="${y}" x2="${SVG_W-mr}" y2="${y}" stroke="#ebebeb" stroke-width="1"/>`;
      svgBody+=`<text x="${ml-4}" y="${(parseFloat(y)+4).toFixed(1)}" text-anchor="end" fill="#bbb" font-size="9" font-family="Arial,Helvetica,sans-serif">${v}</text>`;
    });

    // Right axis labels (pipeline ratio ×)
    [0,1,yMaxD].forEach(v=>{
      svgBody+=`<text x="${SVG_W-mr+4}" y="${(parseFloat(cyD(v))+4).toFixed(1)}" text-anchor="start" fill="#7e5cd6" font-size="9" font-family="Arial,Helvetica,sans-serif">${v}×</text>`;
    });

    // Stacked bars: Complete (green, bottom) + Active (blue, top)
    const R=2;
    s.weeklyTrend.forEach((w,i)=>{
      const complete=w.cohortComplete||0,active=w.cohortActive||0;
      if(complete+active===0) return;
      const xi=parseFloat(cx(i)),x0=xi-barW/2;
      const baseY=parseFloat(cyC(0));

      if(complete>0){
        const topY=parseFloat(cyC(complete));
        const h=baseY-topY;
        if(active===0){
          // Complete is the top bar — round its top corners
          svgBody+=`<path d="M ${x0+R} ${topY} L ${x0+barW-R} ${topY} Q ${x0+barW} ${topY} ${x0+barW} ${topY+R} L ${x0+barW} ${topY+h} L ${x0} ${topY+h} L ${x0} ${topY+R} Q ${x0} ${topY} ${x0+R} ${topY} Z" fill="rgba(60,185,100,0.83)"/>`;
        } else {
          // Active sits above — flat top on Complete
          svgBody+=`<rect x="${x0}" y="${topY}" width="${barW}" height="${h}" fill="rgba(60,185,100,0.83)"/>`;
        }
      }

      if(active>0){
        const stackBaseY=parseFloat(cyC(complete));
        const topY=parseFloat(cyC(complete+active));
        const h=stackBaseY-topY;
        // Rounded top corners only
        svgBody+=`<path d="M ${x0+R} ${topY} L ${x0+barW-R} ${topY} Q ${x0+barW} ${topY} ${x0+barW} ${topY+R} L ${x0+barW} ${topY+h} L ${x0} ${topY+h} L ${x0} ${topY+R} Q ${x0} ${topY} ${x0+R} ${topY} Z" fill="rgba(98,155,230,0.83)"/>`;
      }
    });

    // Pipeline ratio line + dots (right axis)
    let pathD='',inSeg=false;
    s.weeklyTrend.forEach((w,i)=>{
      if(w.pipeRatio!=null){ pathD+=inSeg?`L ${cx(i)} ${cyD(w.pipeRatio)} `:`M ${cx(i)} ${cyD(w.pipeRatio)} `; inSeg=true; }
      else { inSeg=false; }
    });
    if(pathD) svgBody+=`<path d="${pathD.trim()}" fill="none" stroke="#7e5cd6" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    s.weeklyTrend.forEach((w,i)=>{ if(w.pipeRatio!=null) svgBody+=`<circle cx="${cx(i)}" cy="${cyD(w.pipeRatio)}" r="3.5" fill="#7e5cd6"/>`; });

    // X-axis labels
    s.weeklyTrend.forEach((w,i)=>{
      const isLast=i===n-1;
      svgBody+=`<text x="${cx(i)}" y="${SVG_H-26}" text-anchor="middle" fill="${isLast?'#555':'#bbb'}" font-size="9" font-family="Arial,Helvetica,sans-serif">${w.label}</text>`;
    });

    // Legend
    svgBody+=`<rect x="${ml}" y="5" width="12" height="10" rx="1" fill="rgba(60,185,100,0.83)"/>`;
    svgBody+=`<text x="${ml+16}" y="14" fill="#666" font-size="10" font-family="Arial,Helvetica,sans-serif">Complete</text>`;
    svgBody+=`<rect x="${ml+90}" y="5" width="12" height="10" rx="1" fill="rgba(98,155,230,0.83)"/>`;
    svgBody+=`<text x="${ml+106}" y="14" fill="#666" font-size="10" font-family="Arial,Helvetica,sans-serif">Active</text>`;
    svgBody+=`<line x1="${ml+160}" y1="10" x2="${ml+172}" y2="10" stroke="#7e5cd6" stroke-width="2"/>`;
    svgBody+=`<circle cx="${ml+166}" cy="10" r="3" fill="#7e5cd6"/>`;
    svgBody+=`<text x="${ml+176}" y="14" fill="#666" font-size="10" font-family="Arial,Helvetica,sans-serif">Pipeline ratio</text>`;

    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${SVG_W}" height="${SVG_H}">${svgBody}</svg>`;
    const svgPng=await svgToDataURL(svg,SVG_W,SVG_H);
    if(svgPng) rows+=`<tr><td style="padding:16px 24px 4px;"><img src="${svgPng}" width="${SVG_W}" height="${SVG_H}" style="display:block;max-width:100%;border:0;" alt=""></td></tr>`;
  }

  // ── Daily completions bar chart ──────────────────────────
  if(s.mode==='daily'&&s.wtdDays&&s.wtdDays.length){
    const D_W=552,D_H=120,Dml=12,Dmr=54,Dmt=22,Dmb=26;
    const Dcw=D_W-Dml-Dmr, Dch=D_H-Dmt-Dmb;
    const maxCount=Math.max(...s.wtdDays.map(d=>d.count),0);
    const dYMax=Math.max(Math.ceil(maxCount*1.3/5)*5,Math.ceil((s.histDailyAvg||0)*1.3/5)*5,10);
    const Dbaseline=Dmt+Dch;
    const DcolW=Dcw/5, DbarW=Math.floor(DcolW*0.54);
    const Dcx=i=>(Dml+(i+0.5)*DcolW).toFixed(1);
    const DAY_LABELS=['Mon','Tue','Wed','Thu','Fri'];

    let dBody='';
    // Avg dashed line
    if(s.histDailyAvg>0){
      const ay=(Dbaseline-(s.histDailyAvg/dYMax)*Dch).toFixed(1);
      dBody+=`<line x1="${Dml}" y1="${ay}" x2="${D_W-Dmr}" y2="${ay}" stroke="#d0d0cc" stroke-width="1" stroke-dasharray="4,3"/>`;
      dBody+=`<text x="${D_W-Dmr+5}" y="${(parseFloat(ay)+4).toFixed(1)}" fill="#bbb" font-size="9" font-family="Arial,Helvetica,sans-serif">4-wk avg</text>`;
    }
    // Baseline
    dBody+=`<line x1="${Dml}" y1="${Dbaseline}" x2="${D_W-Dmr}" y2="${Dbaseline}" stroke="#e0e0db" stroke-width="1"/>`;
    // Bars, counts, day labels
    for(let i=0;i<5;i++){
      const d=s.wtdDays[i];
      const isYest=d&&d.date===s.yesterday;
      const lc=isYest?'#444':d?'#aaa':'#d8d8d8';
      dBody+=`<text x="${Dcx(i)}" y="${(Dbaseline+16).toFixed(1)}" text-anchor="middle" fill="${lc}" font-size="10" font-family="Arial,Helvetica,sans-serif">${DAY_LABELS[i]}</text>`;
      if(!d||d.count===0) continue;
      const bh=Math.max((d.count/dYMax)*Dch,2);
      const bx=(parseFloat(Dcx(i))-DbarW/2).toFixed(1);
      const byTop=(Dbaseline-bh).toFixed(1);
      dBody+=`<rect x="${bx}" y="${byTop}" width="${DbarW}" height="${bh.toFixed(1)}" rx="2" fill="${isYest?'#378ADD':'#c8d6e8'}"/>`;
      dBody+=`<text x="${Dcx(i)}" y="${(parseFloat(byTop)-5).toFixed(1)}" text-anchor="middle" fill="${isYest?'#222':'#888'}" font-size="${isYest?12:11}" font-weight="${isYest?'700':'400'}" font-family="Arial,Helvetica,sans-serif">${d.count}</text>`;
    }
    const dailySvg=`<svg xmlns="http://www.w3.org/2000/svg" width="${D_W}" height="${D_H}">${dBody}</svg>`;
    const dailyPng=await svgToDataURL(dailySvg,D_W,D_H);

    rows+=`<tr><td style="padding:16px 24px 0;">

      ${dailyPng?`<img src="${dailyPng}" width="${D_W}" height="${D_H}" style="display:block;max-width:100%;border:0;" alt="">`:''}
    </td></tr>`;
  }

  // ── Commentary ──────────────────────────────────────────
  if(commentary&&commentary.trim()){
    rows+=`<tr><td style="${base}padding:16px 24px;border-top:1px solid #ebebeb;line-height:1.7;">${commentary.replace(/\n/g,'<br>')}</td></tr>`;

  </td></tr>`;

  // ── Signature footer ─────────────────────────────────────
  rows+=`<tr><td style="background:#f8f8f8;border-top:1px solid #e8e8e8;padding:16px 24px;">

      <tr>

            <tr><td style="${f}font-size:11px;color:#aaa;">801-793-1861 &middot; <a href="mailto:douglas.regehr@sunpower.com" style="${f}font-size:11px;color:#aaa;text-decoration:none;">douglas.regehr@sunpower.com</a></td></tr>
          </table>

  </td></tr>`;

  return `<!DOCTYPE html>

<!--[if mso]><style>table{border-collapse:collapse;}td,p{mso-line-height-rule:exactly;font-family:Arial,Helvetica,sans-serif;}</style><![endif]-->
</head>
<body style="margin:0;padding:32px 0;background:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
<!--[if mso]><table width="600" align="center" cellpadding="0" cellspacing="0" border="0"><tr><td><![endif]-->
<table width="600" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;background:#fff;border:1px solid #e0e0e0;">
  ${rows}
</table>
<!--[if mso]></td></tr></table><![endif]-->
</body></html>`;
}

  if(stats.mode==='monday'){
    pel.textContent=`Week of ${stats.periodLabel}`;
    const ct=stats.medCycle;
    const ctClass=ct==null?'':(ct<=3?'good':ct<=5?'warn':'bad');
    el.innerHTML=`
      <div class="stat-row"><span class="stat-label">New In</span><span class="stat-val">${stats.newIn}</span></div>
      <div class="stat-row"><span class="stat-label">Completed</span><span class="stat-val">${stats.completedCount}</span></div>
      <div class="stat-row"><span class="stat-label">WIP (end of week)</span><span class="stat-val">${stats.wip}${stats.wipChange!=null?' ('+(stats.wipChange>=0?'+':'')+stats.wipChange+' vs prior wk)':''}</span></div>
      ${stats.pipelineRatio!=null?`<div class="stat-row"><span class="stat-label">Pipeline ratio</span><span class="stat-val ${stats.pipelineRatio<=1?'good':'warn'}">${stats.pipelineRatio.toFixed(2)}× (${stats.prAvg.toFixed(1)} avg/wk)</span></div>`:''}
      <div class="stat-row"><span class="stat-label">Median cycle</span><span class="stat-val ${ctClass}">${ct!=null?ct.toFixed(1)+'d':'—'}</span></div>
      ${stats.outlierCount>0?`<div class="stat-row"><span class="stat-label">Outliers above fence</span><span class="stat-val warn">${stats.outlierCount} (max ${stats.maxOutlier.toFixed(0)}d)</span></div>`:''}
      <div class="stat-row"><span class="stat-label">3-wk trend</span><span class="stat-val ${stats.trend==='Improving'?'good':stats.trend==='Slipping'?'bad':''}">${stats.trend||'—'}</span></div>

  } else {
    pel.textContent=`Yesterday · ${fmtMed(stats.yesterday)}`;
    const ct=stats.medCycleWTD;
    const ctClass=ct==null?'':(ct<=3?'good':ct<=5?'warn':'bad');
    el.innerHTML=`
      <div class="stat-row"><span class="stat-label">New in yesterday</span><span class="stat-val">${stats.newInYesterday}</span></div>
      <div class="stat-row"><span class="stat-label">Completed yesterday</span><span class="stat-val">${stats.completedYesterday}</span></div>
      <div class="stat-row"><span class="stat-label">New in WTD</span><span class="stat-val">${stats.newInWTD}</span></div>
      <div class="stat-row"><span class="stat-label">Completed WTD</span><span class="stat-val">${stats.completedWTD}</span></div>
      ${ct!=null?`<div class="stat-row"><span class="stat-label">WTD median cycle</span><span class="stat-val ${ctClass}">${ct.toFixed(1)}d</span></div>`:''}
      ${stats.projectedWeek!=null?`<div class="stat-row"><span class="stat-label">Projected week total</span><span class="stat-val">${stats.projectedWeek} <span style="font-size:10px;font-weight:400;color:var(--muted);">(4-wk avg: ${stats.histAvg})</span></span></div>`:''}`;
  }
}

function renderObs(){
  const obs=getObservations(stats);
  const el=document.getElementById('obs-body');
  if(!obs.length){ el.innerHTML='<div style="font-size:11px;color:var(--faint);padding:4px 0;">Nothing flagged.</div>'; return; }
  el.innerHTML='<div class="obs-list">'+obs.map((o,i)=>`
    <label class="obs-item unchecked" id="obs-label-${i}">
      <input type="checkbox" id="obs-${i}" onchange="onObsToggle(${i})">
      <span>${o}</span>
    </label>`).join('')+'</div>';
}

function onObsToggle(i){
  const cb=document.getElementById('obs-'+i);
  const lbl=document.getElementById('obs-label-'+i);
  if(lbl) lbl.classList.toggle('unchecked',!cb.checked);
}

function renderCommentary(){
  document.getElementById('commentary-body').innerHTML=`
    <div class="btn-row">
      <button class="btn btn-primary" id="gen-btn" onclick="generateCommentary()" ${!ROWS.length?'disabled':''}>Generate options</button>
    </div>`;
}

async function refreshPreview(){
  const manualNote=document.getElementById('manual-note').value;
  const html=await buildEmailHTML(stats, selectedCommentary, manualNote);
  const frame=document.getElementById('preview-frame');
  frame.srcdoc=html;
  frame.style.height='600px';
  frame.onload=()=>{ try{ frame.style.height=(frame.contentDocument.body.scrollHeight+40)+'px'; }catch(e){} };
}

// ─── COMMENTARY ───────────────────────────────────────────
async function generateCommentary(){
  if(!stats) return;
  const btn=document.getElementById('gen-btn');
  btn.disabled=true; btn.textContent='Generating…';
  const body=document.getElementById('commentary-body');
  body.innerHTML='<div class="loading">Calling Claude…</div>';

  const allObs=getObservations(stats);
  const checkedObs=allObs.filter((_,i)=>{
    const cb=document.getElementById('obs-'+i);
    return cb?cb.checked:false;
  });
  const manualNote=document.getElementById('manual-note').value;

  try{
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({stats, mode, observations:checkedObs, manualNote}),
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'API error');
    renderOptions(data.options);
  }catch(err){
    body.innerHTML=`<div style="font-size:11px;color:#991b1b;padding:8px 0;">Error: ${err.message}</div>
      <div class="btn-row"><button class="btn btn-primary" id="gen-btn" onclick="generateCommentary()">Retry</button></div>`;
  }
}

const TONE_LABELS=['Terse','Balanced','Explanatory'];

function renderOptions(options){
  if(!options||!options.length){
    document.getElementById('commentary-body').innerHTML='<div style="font-size:11px;color:var(--muted);padding:8px 0;">No options returned.</div>';
    return;
  }
  const html=`<div class="options-list" id="opt-list">${options.map((o,i)=>`
    <div class="opt${selectedCommentary===o?' selected':''}" onclick="selectOption(this,'${escAttr(o)}')">
      <div class="opt-label">Option ${i+1} — ${TONE_LABELS[i]||''}</div>
      ${esc(o)}
    </div>`).join('')}</div>
    <div id="edit-wrap" style="${selectedCommentary?'':'display:none;'}margin-top:10px;">
      <label style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;">Edit</label>
      <textarea id="edit-ta" rows="4" oninput="selectedCommentary=this.value;refreshPreview();" style="width:100%;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);resize:vertical;font-family:inherit;outline:none;line-height:1.5;">${esc(selectedCommentary)}</textarea>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-primary" id="gen-btn" onclick="generateCommentary()">Regenerate</button>
      <button class="btn" onclick="clearCommentary()">Clear</button>
    </div>`;
  document.getElementById('commentary-body').innerHTML=html;
}

function selectOption(el, text){
  document.querySelectorAll('.opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  selectedCommentary=text;
  const wrap=document.getElementById('edit-wrap');
  const ta=document.getElementById('edit-ta');
  if(wrap) wrap.style.display='';
  if(ta) ta.value=text;
  refreshPreview();
}

function clearCommentary(){
  selectedCommentary='';
  refreshPreview();
  renderCommentary();
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return s.replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,' '); }

// ─── SEND ACTIONS ─────────────────────────────────────────
async function copyRenderedHTML(html){
  try{
    await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([html],{type:'text/plain'})})]);
    return true;
  }catch(e){
    await navigator.clipboard.writeText(html);
    return false;
  }
}

async function copyHTML(){
  const manualNote=document.getElementById('manual-note').value;
  const html=await buildEmailHTML(stats, selectedCommentary, manualNote);
  const rich=await copyRenderedHTML(html);
  flash(rich?'Email copied — paste into Outlook or Gmail body':'HTML source copied (browser limitation)');
}

async function openOutlook(){
  const manualNote=document.getElementById('manual-note').value;
  const html=await buildEmailHTML(stats, selectedCommentary, manualNote);
  const to=document.getElementById('to-field').value.replace(/;\s*/g,',');
  const subject=document.getElementById('subject-field').value;
  await copyRenderedHTML(html);
  window.open(`https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent(to)}&subject=${encodeURIComponent(subject)}`,'outlook-compose');
  flash('Outlook opening — select all (Cmd+A) then paste (Cmd+V) to replace default signature');
}

function flash(msg){
  let t=document.getElementById('_toast');
  if(!t){ t=document.createElement('div'); t.id='_toast';
    t.style.cssText='position:fixed;bottom:16px;right:16px;background:#1a1a1a;color:#fff;padding:8px 13px;border-radius:7px;font-size:11px;z-index:999;font-family:sans-serif;';
    document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0',2500);
}

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('load',()=>{
  const today=new Date();
  document.getElementById('nav-date').textContent=today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const dow=today.getDay();
  setMode(dow===1||dow===0?'monday':'daily');
});
</script>
