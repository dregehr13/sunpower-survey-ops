<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Survey — Email Generator</title>
<style>
:root{
  --bg:#f2f2ef;--surface:#fff;--border:#e0e0db;--text:#1a1a1a;--muted:#6b6b6b;--faint:#aaa;
  --green:#2d6a0a;--green-bg:#e6f4d7;--amber:#92400e;--amber-bg:#fef3c7;
  --red:#991b1b;--red-bg:#fee2e2;--blue:#2563eb;--radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
.nav{background:#111;display:flex;align-items:center;padding:0 20px;height:48px;gap:12px;}
.brand{color:#fff;font-size:13px;font-weight:600;}
.brand span{color:#555;font-weight:400;}
.nav-mode{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid #333;color:#777;cursor:pointer;background:transparent;}
.nav-mode.active{background:#fff;color:#111;border-color:#fff;}
.nav-date{font-size:10px;color:#555;margin-left:auto;}
.wrap{max-width:1100px;margin:0 auto;padding:18px 22px;display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;}
.ptitle{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #f5f5f2;}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:11px;color:var(--muted);}
.stat-val{font-size:13px;font-weight:600;}
.stat-val.good{color:var(--green);}
.stat-val.warn{color:var(--amber);}
.stat-val.bad{color:var(--red);}
.obs-list{margin:8px 0 0;}
.obs-item{display:flex;align-items:flex-start;gap:7px;padding:5px 8px;border-radius:6px;background:#fef9ec;border:1px solid #fde68a;font-size:11px;color:#78350f;margin-bottom:5px;line-height:1.5;cursor:pointer;}
.obs-item input[type=checkbox]{flex-shrink:0;margin-top:2px;cursor:pointer;}
.obs-item.unchecked{opacity:.45;background:#f5f5f2;border-color:#e0e0db;color:var(--muted);}
textarea{width:100%;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);resize:vertical;font-family:inherit;outline:none;line-height:1.5;}
textarea:focus{border-color:#999;}
.btn{font-size:12px;padding:6px 13px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn-primary{background:#111;color:#fff;border-color:#111;}
.btn-primary:hover{background:#333;}
.btn-primary:disabled{opacity:.4;cursor:default;}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.options-list{margin:10px 0 0;}
.opt{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);line-height:1.6;cursor:pointer;margin-bottom:7px;transition:border-color .1s,background .1s;}
.opt:hover{border-color:#999;background:#fafaf8;}
.opt.selected{border-color:var(--blue);background:#eff6ff;}
.opt-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-bottom:4px;}
.loading{font-size:11px;color:var(--muted);padding:12px 0;text-align:center;}
.preview-frame{width:100%;border:none;border-radius:var(--radius-lg);background:#f4f4f4;}
.preview-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.preview-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);}
.preview-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.preview-actions{display:flex;gap:7px;}
.subject-row{margin-bottom:12px;}
.subject-row label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
.subject-row input{width:100%;font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none;}
.subject-row input:focus{border-color:#999;}
.empty-state{padding:48px;text-align:center;color:var(--faint);font-size:12px;line-height:1.8;}
.section-gap{margin-top:12px;}
@media(max-width:860px){.wrap{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav class="nav">
  <div class="brand">Site Survey <span>Email</span></div>
  <button class="nav-mode" id="btn-monday" onclick="setMode('monday')">Monday recap</button>
  <button class="nav-mode" id="btn-daily" onclick="setMode('daily')">Daily (Tue–Fri)</button>
  <span class="nav-date" id="nav-date"></span>
</nav>

<div class="wrap">
  <div>
    <div class="panel" id="stats-panel">
      <div class="ptitle" id="stats-period">Stats</div>
      <div id="stats-body"><div class="empty-state">No data loaded.<br>Export the dashboard first to bake in the latest data.</div></div>
    </div>

    <div class="panel section-gap" id="obs-panel">
      <div class="ptitle">Flagged observations <span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--faint);">— check to include in AI commentary</span></div>
      <div id="obs-body"></div>
    </div>

    <div class="panel section-gap">
      <div class="ptitle">Commentary</div>
      <div id="commentary-body">
        <div class="btn-row">
          <button class="btn btn-primary" id="gen-btn" onclick="generateCommentary()" disabled>Generate options</button>
        </div>
      </div>
      <div class="section-gap">
        <label style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;">Operational context <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
        <textarea id="manual-note" rows="3" placeholder="e.g. One team was short-staffed Tuesday. Scheduling system was down Thursday morning." oninput="refreshPreview()"></textarea>
      </div>
    </div>
  </div>

  <div>
    <div class="preview-wrap">
      <div class="preview-bar">
        <span class="preview-label">Email preview</span>
        <div class="preview-actions">
          <button class="btn" onclick="copyHTML()">Copy HTML</button>
          <button class="btn btn-primary" onclick="openOutlook()">Open in Outlook</button>
        </div>
      </div>
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);">
        <div class="subject-row">
          <label>To</label>
          <input type="text" id="to-field" value="allie.morais@sunpower.com; spencer.jensen@sunpower.com; robert.barker@sunpower.com" readonly>
        </div>
        <div class="subject-row" style="margin-bottom:0;">
          <label>Subject</label>
          <input type="text" id="subject-field" value="">
        </div>
      </div>
      <div style="padding:16px;background:#eee;">
        <iframe id="preview-frame" class="preview-frame" style="min-height:500px;"></iframe>
      </div>
    </div>
  </div>
</div>

<script src="/data.js"></script>
<script>
// ─── CONFIG ───────────────────────────────────────────────
const PASSWORD      = 'sunpower';
const DASHBOARD_URL = 'https://sunpower-survey-ops.vercel.app';

// ─── STATE ────────────────────────────────────────────────
let mode = 'monday';
let selectedCommentary = '';
let stats = null;

// ─── AUTH ─────────────────────────────────────────────────
(function auth(){
  if(sessionStorage.getItem('ops_auth')==='1') return;
  const pw = prompt('Password:');
  if(pw === PASSWORD){ sessionStorage.setItem('ops_auth','1'); return; }
  document.body.innerHTML='<p style="padding:2rem;font-family:sans-serif;color:#666;">Access denied.</p>';
  throw new Error('auth');
})();

// ─── DATE UTILS ───────────────────────────────────────────
function toISO(d){ return d.toISOString().slice(0,10); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtShort(s){ if(!s) return '—'; return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtMed(s){ if(!s) return '—'; return new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function todayISO(){ return toISO(new Date()); }
function getLastWeekRange(){
  const today=new Date(); const dow=today.getDay();
  const sinceMon=dow===0?6:dow-1;
  const lastMon=addDays(today,-(sinceMon+7));
  return {from:toISO(lastMon),to:toISO(addDays(lastMon,6))};
}
function getThisWeekMon(){
  const today=new Date(); const dow=today.getDay();
  return toISO(addDays(today,-(dow===0?6:dow-1)));
}
function getYesterday(){ return toISO(addDays(new Date(),-1)); }

// ─── STATS HELPERS ────────────────────────────────────────
function avg(arr){ return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null; }
function med(arr){
  if(!arr.length) return null;
  const s=[...arr].sort((a,b)=>a-b), m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}
function iqrFence(arr,mult=1.5){
  if(arr.length<4) return Infinity;
  const s=[...arr].sort((a,b)=>a-b);
  const q1=s[Math.floor(s.length*.25)],q3=s[Math.floor(s.length*.75)];
  return q3+mult*(q3-q1);
}
function weekMedCycle(from,to){
  const cts=RAW.filter(r=>r.complete>=from&&r.complete<=to).map(r=>r.ct_total).filter(x=>x!=null&&x>=0);
  return med(cts);
}

// ─── COMPUTE STATS ────────────────────────────────────────
function computeStats(){
  if(!RAW.length) return null;

  if(mode==='monday'){
    const period=getLastWeekRange();
    const rows=RAW.filter(r=>r.complete>=period.from&&r.complete<=period.to);
    const cts=rows.map(r=>r.ct_total).filter(x=>x!=null&&x>=0);
    const allCtsM=RAW.filter(r=>r.complete&&r.ct_total!=null&&r.ct_total>=0).map(r=>r.ct_total);
    const fence=iqrFence(allCtsM);
    const outlierRows=rows.filter(r=>r.ct_total!=null&&r.ct_total>fence);

    const wip=RAW.filter(r=>r.start&&r.start<=period.to&&(!r.complete||r.complete>period.to)).length;
    const wipPrior=RAW.filter(r=>r.start&&r.start<period.from&&(!r.complete||r.complete>=period.from)).length;
    const wipChange=wip-wipPrior;

    const w1={from:toISO(addDays(new Date(period.from+'T12:00:00'),-14)),to:toISO(addDays(new Date(period.from+'T12:00:00'),-8))};
    const w2={from:toISO(addDays(new Date(period.from+'T12:00:00'),-7)),to:toISO(addDays(new Date(period.from+'T12:00:00'),-1))};
    const medW1=weekMedCycle(w1.from,w1.to);
    const medW2=weekMedCycle(w2.from,w2.to);
    const medW3=med(cts);
    const rolling=[medW1,medW2,medW3].filter(x=>x!=null);
    const rollingMed=rolling.length?rolling.reduce((a,b)=>a+b,0)/rolling.length:null;
    const prevMed=avg([medW1,medW2].filter(x=>x!=null));
    let trend=null;
    if(medW3!=null&&prevMed!=null){
      trend=medW3<prevMed-0.3?'Improving':medW3>prevMed+0.3?'Slipping':'Holding';
    }

    // 4-week trend for visual (oldest → newest, last week is final entry)
    const weeklyTrend=[];
    for(let i=3;i>=0;i--){
      const wS=toISO(addDays(new Date(period.from+'T12:00:00'),-7*i));
      const wE=toISO(addDays(new Date(wS+'T12:00:00'),6));
      weeklyTrend.push({label:fmtShort(wS),med:weekMedCycle(wS,wE),count:RAW.filter(r=>r.complete>=wS&&r.complete<=wE).length});
    }

    const onTargetPct=cts.length?Math.round(cts.filter(x=>x<=4).length/cts.length*100):null;
    const newIn=RAW.filter(r=>r.start>=period.from&&r.start<=period.to).length;
    return {
      mode:'monday', period, periodLabel:`${fmtShort(period.from)} – ${fmtShort(period.to)}`,
      newIn, wip, wipChange,
      completedCount:rows.length,
      medCycle:med(cts), onTargetPct,
      outlierCount:outlierRows.length,
      outlierRows,
      maxOutlier:outlierRows.length?Math.max(...outlierRows.map(r=>r.ct_total)):null,
      trend, rollingMed, weeklyTrend,
    };
  } else {
    const yesterday=getYesterday();
    const wtdFrom=getThisWeekMon();
    const completedYesterday=RAW.filter(r=>r.complete===yesterday).length;
    const newInYesterday=RAW.filter(r=>r.start===yesterday).length;
    const wtdRows=RAW.filter(r=>r.complete>=wtdFrom&&r.complete<=yesterday);
    const wtdCts=wtdRows.map(r=>r.ct_total).filter(x=>x!=null&&x>=0);
    const newInWTD=RAW.filter(r=>r.start>=wtdFrom&&r.start<=yesterday).length;

    // Pace projection
    const yesterdayDow=new Date(yesterday+'T12:00:00').getDay();
    const daysThruYest=yesterdayDow===0?5:yesterdayDow-1; // Mon=1…Fri=5
    const projectedWeek=daysThruYest>0?Math.round(wtdRows.length/daysThruYest*5):null;

    // 4-week historical weekly completion avg
    const wtdMonday=new Date(wtdFrom+'T12:00:00');
    const fourWkComps=[1,2,3,4].map(i=>{
      const wk=toISO(addDays(wtdMonday,-7*i));
      const wkEnd=toISO(addDays(new Date(wk+'T12:00:00'),6));
      return RAW.filter(r=>r.complete>=wk&&r.complete<=wkEnd).length;
    });
    const histAvg=Math.round(fourWkComps.reduce((a,b)=>a+b,0)/4);

    // Slow account detection
    const allCts=RAW.filter(r=>r.complete&&r.ct_total!=null&&r.ct_total>=0).map(r=>r.ct_total);
    const globalFence=iqrFence(allCts);
    const slowYesterday=RAW.filter(r=>r.complete===yesterday&&r.ct_total!=null&&r.ct_total>globalFence);

    return {
      mode:'daily', yesterday, wtdFrom, wtdTo:yesterday,
      completedYesterday, newInYesterday,
      completedWTD:wtdRows.length, newInWTD,
      medCycleWTD:med(wtdCts),
      projectedWeek, histAvg,
      slowYesterday,
    };
  }
}

// ─── OBSERVATIONS ─────────────────────────────────────────
function getObservations(s){
  const obs=[];
  if(!s) return obs;
  if(s.mode==='monday'){
    if(s.completedCount===0) obs.push('Zero completions this week — confirm data loaded correctly.');
    if(s.medCycle!=null&&s.medCycle>6) obs.push(`Median cycle time (${s.medCycle.toFixed(1)}d) is significantly above the 3d target.`);
    else if(s.medCycle!=null&&s.medCycle>4) obs.push(`Median cycle time (${s.medCycle.toFixed(1)}d) is above target.`);
    if(s.outlierCount>0) obs.push(`${s.outlierCount} outlier${s.outlierCount>1?'s':''} above IQR fence. Longest: ${s.maxOutlier.toFixed(0)}d.`);
    if(s.trend==='Slipping') obs.push('3-week trend is slipping — median cycle time is moving up.');
    if(s.trend==='Improving') obs.push('3-week trend is improving — median cycle time is moving down.');
  } else {
    if(s.completedYesterday===0) obs.push('Zero completions yesterday — confirm this is correct.');
    if(s.medCycleWTD!=null&&s.medCycleWTD>6) obs.push(`WTD median cycle (${s.medCycleWTD.toFixed(1)}d) is significantly above the 3d target.`);
    else if(s.medCycleWTD!=null&&s.medCycleWTD>4) obs.push(`WTD median cycle (${s.medCycleWTD.toFixed(1)}d) is above target.`);
    if(s.slowYesterday&&s.slowYesterday.length>0){
      s.slowYesterday.forEach(r=>{
        obs.push(`Outlier completed yesterday: ${r.ct_total.toFixed(0)}d${r.region?' ('+r.region+')':''} — may warrant a note.`);
      });
    }
  }
  return obs;
}

// ─── EMAIL HTML ───────────────────────────────────────────
function buildEmailHTML(s, commentary, manualNote){
  if(!s) return '<p style="font-family:Arial;padding:24px;color:#999;">No data.</p>';

  const f='font-family:Arial,Helvetica,sans-serif;';
  const base=`${f}font-size:13px;color:#111;line-height:1.6;`;
  const small=`${f}font-size:11px;color:#888;line-height:1.6;`;

  // Card style helpers
  function cardCell(bg,border,extra=''){
    return `${f}text-align:center;padding:14px 12px;background:${bg};border:1px solid ${border};${extra}`;
  }
  function metLabel(c='#999'){ return `display:block;${f}font-size:10px;color:${c};text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;`; }
  function metVal(c='#111'){   return `display:block;${f}font-size:26px;font-weight:700;line-height:1;color:${c};`; }
  function metSub(c='#aaa',bc='#e8e8e8'){ return `display:block;${f}font-size:10px;color:${c};margin-top:5px;border-top:1px solid ${bc};padding-top:5px;`; }

  // Cycle time card colors
  function ctColors(v){
    if(v==null)       return {bg:'#f8f8f8',b:'#e8e8e8',lc:'#999', vc:'#111',  sc:'#aaa', sbc:'#e8e8e8',mark:''};
    if(v<=3)          return {bg:'#f0f7eb',b:'#d4e8c2',lc:'#6a9a3a',vc:'#2d6a0a',sc:'#7aaa44',sbc:'#c8e0a8',mark:' ✓'};
    if(v<=5)          return {bg:'#fef9ec',b:'#fde68a',lc:'#d97706',vc:'#92400e',sc:'#d97706',sbc:'#fde68a',mark:''};
    return             {bg:'#fff1f1',b:'#fecaca',lc:'#ef4444',vc:'#991b1b',sc:'#ef4444',sbc:'#fecaca',mark:''};
  }

  let rows='';

  // ── Header ──────────────────────────────────────────────
  const title=s.mode==='monday'
    ?`Site Survey — Week of ${s.periodLabel}`
    :`Site Survey — ${fmtMed(s.yesterday)}`;
  rows+=`<tr><td style="border-left:4px solid #378ADD;padding:16px 24px 16px 20px;">
    <span style="${f}font-size:13px;font-weight:700;color:#111;letter-spacing:.02em;">${title}</span>
  </td></tr>`;

  // ── Metric cards ────────────────────────────────────────
  rows+=`<tr><td style="padding:20px 24px 0;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
      <tr>`;

  if(s.mode==='monday'){
    const ct=ctColors(s.medCycle);
    const wipSub=(s.wipChange!=null?(s.wipChange>=0?'+':'')+s.wipChange+' vs prior wk':'end of week');
    rows+=`
        <td style="${cardCell('#f8f8f8','#e8e8e8','width:25%;border-right:0;')}">
          <span style="${metLabel()}">New In</span>
          <span style="${metVal()}">${s.newIn}</span>
          <span style="${metSub()}">week started</span>
        </td>
        <td style="${cardCell('#f8f8f8','#e8e8e8','width:25%;border-right:0;')}">
          <span style="${metLabel()}">Completed</span>
          <span style="${metVal()}">${s.completedCount}</span>
          <span style="${metSub()}">this week</span>
        </td>
        <td style="${cardCell(ct.bg,ct.b,'width:25%;border-right:0;')}">
          <span style="${metLabel(ct.lc)}">Median Cycle</span>
          <span style="${metVal(ct.vc)}">${s.medCycle!=null?s.medCycle.toFixed(1)+'d':'—'}</span>
          <span style="${metSub(ct.sc,ct.sbc)}">target: 3d${ct.mark}${s.onTargetPct!=null?' · '+s.onTargetPct+'% ≤4d':''}</span>
        </td>
        <td style="${cardCell('#f8f8f8','#e8e8e8','width:25%;')}">
          <span style="${metLabel()}">WIP</span>
          <span style="${metVal()}">${s.wip}</span>
          <span style="${metSub()}">${wipSub}</span>
        </td>`;
  } else {
    const ct=ctColors(s.medCycleWTD);
    rows+=`
        <td style="${cardCell('#f8f8f8','#e8e8e8','width:33%;border-right:0;')}">
          <span style="${metLabel()}">New In WTD</span>
          <span style="${metVal()}">${s.newInWTD}</span>
          <span style="${metSub()}">${s.newInYesterday} yesterday</span>
        </td>
        <td style="${cardCell('#f8f8f8','#e8e8e8','width:33%;border-right:0;')}">
          <span style="${metLabel()}">Completed WTD</span>
          <span style="${metVal()}">${s.completedWTD}</span>
          <span style="${metSub()}">${s.completedYesterday} yesterday</span>
        </td>
        <td style="${cardCell(ct.bg,ct.b,'width:34%;')}">
          <span style="${metLabel(ct.lc)}">WTD Median Cycle</span>
          <span style="${metVal(ct.vc)}">${s.medCycleWTD!=null?s.medCycleWTD.toFixed(1)+'d':'—'}</span>
          <span style="${metSub(ct.sc,ct.sbc)}">target: 3d${ct.mark}</span>
        </td>`;
  }

  rows+=`
      </tr>
    </table>
  </td></tr>`;

  // ── 4-week trend visual (Monday only) ───────────────────
  if(s.mode==='monday'&&s.weeklyTrend&&s.weeklyTrend.some(w=>w.med!=null)){
    const maxMed=Math.max(...s.weeklyTrend.map(w=>w.med||0),1);
    const BAR_MAX=260;
    let trendRows='';
    s.weeklyTrend.forEach((w,i)=>{
      const isLast=i===s.weeklyTrend.length-1;
      const barW=w.med!=null?Math.round(w.med/maxMed*BAR_MAX):0;
      const bc=w.med==null?'#e0e0e0':w.med<=3?'#5aaa2a':w.med<=5?'#f59e0b':'#ef4444';
      const valColor=w.med==null?'#aaa':w.med<=3?'#2d6a0a':w.med<=5?'#92400e':'#991b1b';
      trendRows+=`<tr>
        <td width="44" style="${f}font-size:10px;color:${isLast?'#333':'#999'};font-weight:${isLast?'700':'400'};padding:3px 8px 3px 0;white-space:nowrap;">${w.label}</td>
        <td style="padding:3px 0;">
          <table cellpadding="0" cellspacing="0" border="0" style="width:100%;background:#f0f0f0;border-radius:2px;overflow:hidden;"><tr>
            ${barW>0?`<td width="${barW}" height="14" bgcolor="${bc}" style="font-size:0;line-height:0;border-radius:2px;">&nbsp;</td>`:''}
            <td>&nbsp;</td>
          </tr></table>
        </td>
        <td width="36" style="${f}font-size:10px;color:${valColor};font-weight:700;padding:3px 0 3px 8px;text-align:right;white-space:nowrap;">${w.med!=null?w.med.toFixed(1)+'d':'—'}</td>
        <td width="28" style="${f}font-size:10px;color:#bbb;padding:3px 0 3px 6px;text-align:right;">${w.count||''}</td>
      </tr>`;
    });
    rows+=`<tr><td style="padding:16px 24px 0;">
      <div style="${f}font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">4-Week Trend · Median Cycle</div>
      <table width="100%" cellpadding="0" cellspacing="0" border="0">${trendRows}</table>
    </td></tr>`;
  }

  // ── Footnotes (outliers / pace) ──────────────────────────
  const notes=[];
  if(s.mode==='monday'){
    if(s.outlierCount>0){
      notes.push(`<span style="color:#888;">${s.outlierCount} outlier${s.outlierCount>1?'s':''} above IQR fence (max ${s.maxOutlier.toFixed(0)}d) — not counted in median above.</span>`);
    }
  } else {
    if(s.projectedWeek!=null){
      notes.push(`<span style="color:#555;">On pace for ~${s.projectedWeek} completions this week · 4-wk avg: ${s.histAvg}</span>`);
    }
  }
  if(notes.length){
    rows+=`<tr><td style="${small}padding:10px 24px 4px;">${notes.join('<br>')}</td></tr>`;
  }

  // ── Commentary ──────────────────────────────────────────
  if(commentary&&commentary.trim()){
    rows+=`<tr><td style="${base}padding:16px 24px;border-top:1px solid #ebebeb;line-height:1.7;">${commentary.replace(/\n/g,'<br>')}</td></tr>`;
  }

  // Manual note
  if(manualNote&&manualNote.trim()){
    rows+=`<tr><td style="${f}font-size:12px;color:#666;line-height:1.6;padding:0 24px 16px;">${manualNote.trim().replace(/\n/g,'<br>')}</td></tr>`;
  }

  // ── Dashboard link ───────────────────────────────────────
  rows+=`<tr><td style="padding:${commentary||manualNote?'0':'16px'} 24px 20px;">
    <a href="${DASHBOARD_URL}" style="${f}font-size:11px;color:#888;text-decoration:none;border-bottom:1px solid #ccc;">View full dashboard ↗</a>
  </td></tr>`;

  // ── Signature footer ─────────────────────────────────────
  rows+=`<tr><td style="background:#f8f8f8;border-top:1px solid #e8e8e8;padding:16px 24px;">
    <span style="display:block;${f}font-size:12px;font-weight:700;color:#222;">Doug Regehr</span>
    <span style="display:block;${f}font-size:11px;color:#888;margin-top:2px;">Site Survey Manager</span>
    <span style="display:block;${f}font-size:11px;color:#888;margin-top:1px;">801-793-1861 &middot; <a href="mailto:douglas.regehr@sunpower.com" style="color:#888;text-decoration:none;">douglas.regehr@sunpower.com</a></span>
  </td></tr>`;

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"></head>
<body style="margin:0;padding:32px 0;background:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
<table width="600" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;background:#fff;border-radius:4px;overflow:hidden;border:1px solid #e0e0e0;">
  ${rows}
</table>
</body></html>`;
}

// ─── SUBJECT LINE ─────────────────────────────────────────
function buildSubject(){
  if(mode==='monday'){
    const p=getLastWeekRange();
    return `Site Survey Weekly Recap — ${fmtShort(p.from)}–${fmtShort(p.to)}`;
  } else {
    return `Site Survey Daily Report — ${fmtMed(getYesterday())}`;
  }
}

// ─── UI ───────────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.getElementById('btn-monday').classList.toggle('active',m==='monday');
  document.getElementById('btn-daily').classList.toggle('active',m==='daily');
  selectedCommentary='';
  render();
}

function render(){
  stats=computeStats();
  renderStats();
  renderObs();
  renderCommentary();
  document.getElementById('subject-field').value=buildSubject();
  refreshPreview();
  document.getElementById('gen-btn').disabled=!RAW.length;
}

function renderStats(){
  const el=document.getElementById('stats-body');
  const pel=document.getElementById('stats-period');
  if(!stats){ el.innerHTML='<div class="empty-state">No data loaded.</div>'; return; }

  if(stats.mode==='monday'){
    pel.textContent=`Week of ${stats.periodLabel}`;
    const ct=stats.medCycle;
    const ctClass=ct==null?'':(ct<=3?'good':ct<=5?'warn':'bad');
    el.innerHTML=`
      <div class="stat-row"><span class="stat-label">New In</span><span class="stat-val">${stats.newIn}</span></div>
      <div class="stat-row"><span class="stat-label">Completed</span><span class="stat-val">${stats.completedCount}</span></div>
      <div class="stat-row"><span class="stat-label">WIP (end of week)</span><span class="stat-val">${stats.wip}${stats.wipChange!=null?' ('+(stats.wipChange>=0?'+':'')+stats.wipChange+' vs prior wk)':''}</span></div>
      <div class="stat-row"><span class="stat-label">Median cycle</span><span class="stat-val ${ctClass}">${ct!=null?ct.toFixed(1)+'d':'—'}</span></div>
      ${stats.outlierCount>0?`<div class="stat-row"><span class="stat-label">Outliers above fence</span><span class="stat-val warn">${stats.outlierCount} (max ${stats.maxOutlier.toFixed(0)}d)</span></div>`:''}
      <div class="stat-row"><span class="stat-label">3-wk trend</span><span class="stat-val ${stats.trend==='Improving'?'good':stats.trend==='Slipping'?'bad':''}">${stats.trend||'—'}</span></div>
      ${stats.rollingMed!=null?`<div class="stat-row"><span class="stat-label">3-wk rolling med</span><span class="stat-val">${stats.rollingMed.toFixed(1)}d</span></div>`:''}`;
  } else {
    pel.textContent=`Yesterday · ${fmtMed(stats.yesterday)}`;
    const ct=stats.medCycleWTD;
    const ctClass=ct==null?'':(ct<=3?'good':ct<=5?'warn':'bad');
    el.innerHTML=`
      <div class="stat-row"><span class="stat-label">New in yesterday</span><span class="stat-val">${stats.newInYesterday}</span></div>
      <div class="stat-row"><span class="stat-label">Completed yesterday</span><span class="stat-val">${stats.completedYesterday}</span></div>
      <div class="stat-row"><span class="stat-label">New in WTD</span><span class="stat-val">${stats.newInWTD}</span></div>
      <div class="stat-row"><span class="stat-label">Completed WTD</span><span class="stat-val">${stats.completedWTD}</span></div>
      ${ct!=null?`<div class="stat-row"><span class="stat-label">WTD median cycle</span><span class="stat-val ${ctClass}">${ct.toFixed(1)}d</span></div>`:''}
      ${stats.projectedWeek!=null?`<div class="stat-row"><span class="stat-label">Projected week total</span><span class="stat-val">${stats.projectedWeek} <span style="font-size:10px;font-weight:400;color:var(--muted);">(4-wk avg: ${stats.histAvg})</span></span></div>`:''}`;
  }
}

function renderObs(){
  const obs=getObservations(stats);
  const el=document.getElementById('obs-body');
  if(!obs.length){ el.innerHTML='<div style="font-size:11px;color:var(--faint);padding:4px 0;">Nothing flagged.</div>'; return; }
  el.innerHTML='<div class="obs-list">'+obs.map((o,i)=>`
    <label class="obs-item unchecked" id="obs-label-${i}">
      <input type="checkbox" id="obs-${i}" onchange="onObsToggle(${i})">
      <span>${o}</span>
    </label>`).join('')+'</div>';
}

function onObsToggle(i){
  const cb=document.getElementById('obs-'+i);
  const lbl=document.getElementById('obs-label-'+i);
  if(lbl) lbl.classList.toggle('unchecked',!cb.checked);
}

function renderCommentary(){
  document.getElementById('commentary-body').innerHTML=`
    <div class="btn-row">
      <button class="btn btn-primary" id="gen-btn" onclick="generateCommentary()" ${!RAW.length?'disabled':''}>Generate options</button>
    </div>`;
}

function refreshPreview(){
  const manualNote=document.getElementById('manual-note').value;
  const html=buildEmailHTML(stats, selectedCommentary, manualNote);
  const frame=document.getElementById('preview-frame');
  frame.srcdoc=html;
  frame.style.height='600px';
  frame.onload=()=>{ try{ frame.style.height=(frame.contentDocument.body.scrollHeight+40)+'px'; }catch(e){} };
}

// ─── COMMENTARY ───────────────────────────────────────────
async function generateCommentary(){
  if(!stats) return;
  const btn=document.getElementById('gen-btn');
  btn.disabled=true; btn.textContent='Generating…';
  const body=document.getElementById('commentary-body');
  body.innerHTML='<div class="loading">Calling Claude…</div>';

  const allObs=getObservations(stats);
  const checkedObs=allObs.filter((_,i)=>{
    const cb=document.getElementById('obs-'+i);
    return cb?cb.checked:false;
  });
  const manualNote=document.getElementById('manual-note').value;

  try{
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({stats, mode, observations:checkedObs, manualNote}),
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'API error');
    renderOptions(data.options);
  }catch(err){
    body.innerHTML=`<div style="font-size:11px;color:#991b1b;padding:8px 0;">Error: ${err.message}</div>
      <div class="btn-row"><button class="btn btn-primary" id="gen-btn" onclick="generateCommentary()">Retry</button></div>`;
  }
}

function renderOptions(options){
  if(!options||!options.length){
    document.getElementById('commentary-body').innerHTML='<div style="font-size:11px;color:var(--muted);padding:8px 0;">No options returned.</div>';
    return;
  }
  const html=`<div class="options-list">${options.map((o,i)=>`
    <div class="opt${selectedCommentary===o?' selected':''}" onclick="selectOption(this,'${escAttr(o)}')">
      <div class="opt-label">Option ${i+1}</div>
      ${esc(o)}
    </div>`).join('')}</div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-primary" id="gen-btn" onclick="generateCommentary()">Regenerate</button>
      <button class="btn" onclick="clearCommentary()">Clear</button>
    </div>`;
  document.getElementById('commentary-body').innerHTML=html;
}

function selectOption(el, text){
  document.querySelectorAll('.opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  selectedCommentary=text;
  refreshPreview();
}

function clearCommentary(){
  selectedCommentary='';
  refreshPreview();
  renderCommentary();
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }

// ─── SEND ACTIONS ─────────────────────────────────────────
async function copyRenderedHTML(html){
  try{
    await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([html],{type:'text/plain'})})]);
    return true;
  }catch(e){
    await navigator.clipboard.writeText(html);
    return false;
  }
}

async function copyHTML(){
  const manualNote=document.getElementById('manual-note').value;
  const html=buildEmailHTML(stats, selectedCommentary, manualNote);
  const rich=await copyRenderedHTML(html);
  flash(rich?'Email copied — paste into Outlook or Gmail body':'HTML source copied (browser limitation)');
}

async function openOutlook(){
  const manualNote=document.getElementById('manual-note').value;
  const html=buildEmailHTML(stats, selectedCommentary, manualNote);
  const to=document.getElementById('to-field').value.replace(/;\s*/g,',');
  const subject=document.getElementById('subject-field').value;
  await copyRenderedHTML(html);
  window.open(`https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent(to)}&subject=${encodeURIComponent(subject)}`,'outlook-compose');
  flash('Outlook opening — paste body with Cmd+V');
}

function flash(msg){
  let t=document.getElementById('_toast');
  if(!t){ t=document.createElement('div'); t.id='_toast';
    t.style.cssText='position:fixed;bottom:16px;right:16px;background:#1a1a1a;color:#fff;padding:8px 13px;border-radius:7px;font-size:11px;z-index:999;font-family:sans-serif;';
    document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0',2500);
}

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('load',()=>{
  const today=new Date();
  document.getElementById('nav-date').textContent=today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const dow=today.getDay();
  setMode(dow===1||dow===0?'monday':'daily');
});
</script>
</body>
